<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPA BLACK | COSMIC FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --cosmic-glow: #c77dff;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --nebula: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --accent: #00f2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .stars-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
        }

        .container { width: 100%; max-width: 480px; margin: 0 auto; z-index: 1; position: relative; }

        .header { text-align: center; margin: 30px 0; }
        .header h1 { font-size: 26px; text-shadow: 0 0 15px var(--cosmic-glow); color: #fff; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--nebula);
            color: #fff; border: 1px solid var(--cosmic-glow);
            padding: 16px; border-radius: 50px;
            width: 100%; font-weight: bold; cursor: pointer;
            margin-top: 15px; font-size: 16px;
        }

        input {
            width: 100%; padding: 14px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            border-radius: 14px; color: #fff;
            margin-top: 10px; font-size: 14px;
        }

        .app-card {
            display: flex; align-items: center; gap: 15px;
            padding: 15px; background: rgba(255,255,255,0.05);
            border-radius: 20px; margin-top: 15px;
        }

        .app-icon { width: 55px; height: 55px; border-radius: 12px; background: #222; object-fit: cover; }

        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--cosmic-glow); color: #000; padding: 12px 30px;
            border-radius: 50px; font-weight: bold; display: none;
        }

        .result-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>

    <div class="stars-bg"></div>

    <div class="container">
        <div class="header">
            <h1>IPA BLACK 🌌</h1>
            <p style="opacity:0.6; font-size:12px; margin-top:5px;">إصدار الهاتف المستقر</p>
        </div>

        <div class="glass-panel" id="step1">
            <p style="font-size:13px; color:var(--accent); margin-bottom:10px;">١. رفع ملفات IPA</p>
            <button class="btn" style="border-style:dashed; background:transparent;" onclick="document.getElementById('ipaInput').click()">
                اضغط لاختيار الملفات
            </button>
            <input type="file" id="ipaInput" multiple accept=".ipa" style="display:none" onchange="handleIPAs(event)">
            
            <div id="appList"></div>

            <button class="btn" id="zipBtn" style="display:none; background:var(--cosmic-glow); color:#000;" onclick="createZip()">
                تحميل ملفات Plist (ZIP)
            </button>
        </div>

        <div class="glass-panel" id="step2" style="display:none;">
            <p style="font-size:13px; color:var(--accent); margin-bottom:10px;">٢. روابط البيلست المرفوعة</p>
            <div id="plistInputs"></div>
            <button class="btn" onclick="showFinal()">توليد الروابط النهائية</button>
        </div>

        <div class="glass-panel" id="step3" style="display:none;">
            <p style="font-size:13px; color:var(--accent); margin-bottom:10px;">✅ روابط جاهزة للنشر</p>
            <div id="finalLinks"></div>
        </div>
    </div>

    <div id="toast">تم النسخ!</div>

    <script>
        let myApps = [];

        async function handleIPAs(e) {
            const files = e.target.files;
            const list = document.getElementById('appList');
            list.innerHTML = '<p style="font-size:12px; text-align:center; padding:10px;">جاري القراءة...</p>';
            myApps = [];

            for (let i = 0; i < files.length; i++) {
                try {
                    const zip = new JSZip();
                    const content = await zip.loadAsync(files[i]);
                    const pPath = Object.keys(content.files).find(p => p.endsWith('.app/Info.plist'));
                    
                    if (pPath) {
                        const xml = await content.files[pPath].async("string");
                        
                        let displayIcon = "https://www2.0zz0.com/2025/12/23/00/358834181.jpeg";
                        const iconPath = Object.keys(content.files).find(p => p.toLowerCase().includes('appicon60x60') && p.endsWith('.png'));
                        if(iconPath) {
                            const blob = await content.files[iconPath].async("blob");
                            displayIcon = URL.createObjectURL(blob);
                        }

                        const app = {
                            name: extract(xml, 'CFBundleDisplayName') || extract(xml, 'CFBundleName') || files[i].name,
                            bid: extract(xml, 'CFBundleIdentifier') || 'com.black',
                            ver: extract(xml, 'CFBundleShortVersionString') || '1.0',
                            icon: displayIcon,
                            pName: i === 0 ? "manifest.plist" : `manifest.${i}.plist`
                        };
                        myApps.push(app);
                    }
                } catch(err) { console.error(err); }
            }
            render();
        }

        function render() {
            const list = document.getElementById('appList');
            list.innerHTML = '';
            myApps.forEach((app, i) => {
                list.innerHTML += `
                    <div class="app-card">
                        <img src="${app.icon}" class="app-icon">
                        <div style="flex:1">
                            <b style="font-size:14px;">${app.name}</b>
                            <input type="url" class="ipa-url" placeholder="رابط الـ IPA المباشر">
                        </div>
                    </div>`;
            });
            if(myApps.length > 0) document.getElementById('zipBtn').style.display = 'block';
        }

        function extract(xml, key) {
            const m = xml.match(new RegExp(`<key>${key}<\/key>\\s*<string>([^<]+)<\/string>`));
            return m ? m[1] : null;
        }

        async function createZip() {
            const ipaUrls = document.querySelectorAll('.ipa-url');
            const zip = new JSZip();
            const iconLink = "https://www2.0zz0.com/2025/12/23/00/358834181.jpeg";
            
            myApps.forEach((app, i) => {
                const url = ipaUrls[i].value.trim();
                
                // التعديل المطلوب في مفتاح <string> التابع لـ <key>title</key>
                const plist = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
<key>items</key>
<array>
<dict>
<key>assets</key>
<array>
<dict>
<key>kind</key>
<string>software-package</string>
<key>url</key>
<string>${url}</string>
</dict>
<dict>
<key>kind</key>
<string>display-image</string>
<key>url</key>
<string>${iconLink}</string>
</dict>
<dict>
<key>kind</key>
<string>full-size-image</string>
<key>url</key>
<string>${iconLink}</string>
</dict>
</array>
<key>metadata</key>
<dict>
<key>bundle-identifier</key>
<string>${app.bid}</string>
<key>bundle-version</key>
<string>${app.ver}</string>
<key>kind</key>
<string>software</string>
<key>title</key>
<string>يرغب ipa-black بتثبيت ${app.name}</string>
</dict>
</dict>
</array>
</dict>
</plist>`;
                zip.file(app.pName, plist);
            });

            const blob = await zip.generateAsync({type:"blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "PLISTS.zip";
            a.click();

            const pInputs = document.getElementById('plistInputs');
            pInputs.innerHTML = '';
            myApps.forEach(app => {
                pInputs.innerHTML += `<input type="url" class="p-url" placeholder="رابط ملف ${app.pName}">`;
            });
            document.getElementById('step2').style.display = 'block';
        }

        function showFinal() {
            const urls = document.querySelectorAll('.p-url');
            const list = document.getElementById('finalLinks');
            list.innerHTML = '';
            urls.forEach((input, i) => {
                if(input.value) {
                    const link = `itms-services://?action=download-manifest&url=${encodeURIComponent(input.value.trim())}`;
                    list.innerHTML += `
                        <div class="result-row">
                            <span style="font-size:14px;">${myApps[i].name}</span>
                            <button class="btn" style="width:auto; margin:0; padding:5px 15px; font-size:12px;" onclick="copy('${link}')">نسخ</button>
                        </div>`;
                }
            });
            document.getElementById('step3').style.display = 'block';
        }

        function copy(t) {
            navigator.clipboard.writeText(t).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 2000);
            });
        }
    </script>
</body>
</html>
